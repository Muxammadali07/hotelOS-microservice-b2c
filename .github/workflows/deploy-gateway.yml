name: Deploy API Gateway

on:
  push:
    branches: [main]
    paths:
      - 'backend/ApiGateway/**'
      - 'backend/Shared/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish backend/ApiGateway/HotelOS.ApiGateway -c Release -o publish/gateway

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: hotelos-muxammadali-gateway
          package: publish/gateway
